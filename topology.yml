
name: network-lab

topology:
  nodes:
    r1:
      kind: linux
      image: frrouting/frr:latest
      exec:
        - ip addr add 10.0.12.1/24 dev eth1
        - ip link set eth1 up
        - ip addr add 10.10.10.10/32 dev lo1
        - ip link set lo1 up
    
    r2:
      kind: linux
      image: frrouting/frr:latest
      exec:
        - ip addr add 10.0.12.2/24 dev eth1
        - ip addr add 10.0.24.2/24 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up
        - ip addr add 20.20.20.20/32 deb lo1
        - ip link set lo1 up
    
    r3:
      kind: linux
      image: frrouting/frr:latest
      exec:
        - ip addr add 10.0.34.3/24 dev eth1
        - ip link set eth1 up
        - ip addr add 30.30.30.30/32 dev lo1
        - ip link set lo1 up
    
    r4:
      kind: linux
      image: frrouting/frr:latest
      exec:
        - ip addr add 10.0.34.4/24 dev eth1
        - ip addr add 10.0.24.4/24 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up
        - ip addr add 40.40.40.40/32 dev lo1
        - ip link set lo1 up

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r3:eth1", "r4:eth1"]
    - endpoints: ["r2:eth2", "r4:eth2"]