
name: network-lab

topology:
  nodes:
    r1:
      kind: linux
      image: quay.io/frrouting/frr:9.1.0
      cmd: >
       /bin/bash -c "
        sed -i 's/zebra=no/zebra=yes/' /etc/frr/daemons;
        sed -i 's/bgpd=no/bgpd=yes/' /etc/frr/daemons;
        /usr/lib/frr/frrinit.sh start;
        sleep infinity"
      exec:
        - ip addr add 10.0.12.1/24 dev eth1
        - ip link set eth1 up
        - ip link set eth2 up
        - ip addr add 10.10.10.10/32 dev eth2
    
    r2:
      kind: linux
      image: quay.io/frrouting/frr:9.1.0
      cmd: >
       /bin/bash -c "
        sed -i 's/zebra=no/zebra=yes/' /etc/frr/daemons;
        sed -i 's/bgpd=no/bgpd=yes/' /etc/frr/daemons;
        sed -i 's/ospfd=no/ospfd=yes/' /etc/frr/daemons;
        /usr/lib/frr/watchfrr zebra bgpd ospfd;
        sleep infinity"
      exec:
        - ip addr add 10.0.12.2/24 dev eth1
        - ip addr add 10.0.24.2/24 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up
        - ip addr add 20.20.20.20/32 dev eth3
        - ip link set lo up
        - ip addr add 22.22.22.22/32 dev lo
    
    r3:
      kind: linux
      image: quay.io/frrouting/frr:9.1.0
      cmd: >
       /bin/bash -c "
        sed -i 's/zebra=no/zebra=yes/' /etc/frr/daemons;
        sed -i 's/bgpd=no/bgpd=yes/' /etc/frr/daemons;
        /usr/lib/frr/frrinit.sh start;
        sleep infinity"
      exec:
        - ip addr add 10.0.34.3/24 dev eth1
        - ip link set eth1 up
        - ip addr add 30.30.30.30/32 dev eth2
        - ip link set eth2 up
    
    r4:
      kind: linux
      image: quay.io/frrouting/frr:9.1.0
      cmd: >
       /bin/bash -c "
        sed -i 's/zebra=no/zebra=yes/' /etc/frr/daemons;
        sed -i 's/bgpd=no/bgpd=yes/' /etc/frr/daemons;
        sed -i 's/ospfd=no/ospfd=yes/' /etc/frr/daemons;
        /usr/lib/frr/watchfrr zebra bgpd ospfd;
        sleep infinity"
      exec:
        - ip addr add 10.0.34.4/24 dev eth1
        - ip addr add 10.0.24.4/24 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up
        - ip addr add 40.40.40.40/32 dev eth3
        - ip link set lo up
        - ip addr add 44.44.44.44/32 dev lo

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r3:eth1", "r4:eth1"]
    - endpoints: ["r2:eth2", "r4:eth2"]