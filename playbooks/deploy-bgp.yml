
---
- name: Deploy BGP Configuration
  hosts: all_routers
  gather_facts: no
  connection: local
  become: yes  # Add this line to enable sudo for all tasks

  tasks:
    - name: Load router configuration
      include_vars:
        file: "../routers/{{ inventory_hostname }}.yaml"
        name: router_config
      become: no  # This task doesn't need sudo

    - name: Check if container is running
      shell: docker ps --filter "name={{ router_config.container_name }}" | grep -c {{ router_config.container_name }}
      register: container_check
      failed_when: false
      ignore_errors: yes

    - name: Display container status
      debug:
        msg: "Container {{ router_config.container_name }} status: {{ 'Running' if container_check.rc == 0 else 'Not Found' }}"

    - name: Verify FRR is running in container
      shell: docker exec {{ router_config.container_name }} ps aux | grep bgpd
      register: bgpd_check
      failed_when: false
      ignore_errors: yes

    - name: Display BGP daemon status
      debug:
        msg: "BGP daemon status: {{ bgpd_check.stdout_lines }}"

    - name: Test vtysh connectivity
      shell: docker exec {{ router_config.container_name }} vtysh -c "show version"
      register: vtysh_test
      failed_when: false
      ignore_errors: yes

    - name: Display vtysh test result
      debug:
        msg: "vtysh test: {{ 'SUCCESS' if vtysh_test.rc == 0 else 'FAILED - ' + vtysh_test.stderr }}"

    - name: Generate BGP config from template
      template:
        src: "../templates/bgp.j2"
        dest: "/tmp/{{ inventory_hostname }}_bgp.conf"

    - name: Copy config into container (temp location)
      shell: docker cp /tmp/{{ inventory_hostname }}_bgp.conf {{ router_config.container_name }}:/tmp/bgp.conf

    - name: Apply config via vtysh
      shell: docker exec {{ router_config.container_name }} vtysh -f /tmp/bgp.conf
      register: bgp_config

    - name: Save configuration
      shell: docker exec {{ router_config.container_name }} vtysh -c "write memory"
      when: bgp_config.rc == 0

    - name: Display BGP configuration result
      debug:
        msg:
          - "Return code: {{ bgp_config.rc }}"
          - "STDOUT: {{ bgp_config.stdout }}"
          - "STDERR: {{ bgp_config.stderr }}"

    - name: Fail if BGP configuration failed
      fail:
        msg: "BGP configuration failed on {{ inventory_hostname }}: {{ bgp_config.stderr }}"
      when: bgp_config.rc != 0

    - name: Wait for BGP convergence
      pause:
        seconds: 30

    - name: Verify BGP neighbors
      shell: docker exec {{ router_config.container_name }} vtysh -c "show ip bgp summary"
      register: bgp_status

    - name: Display BGP status
      debug:
        msg: "{{ bgp_status.stdout_lines }}"