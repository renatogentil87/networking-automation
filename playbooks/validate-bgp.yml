---
- name: Validate BGP Configuration
  hosts: all_routers
  gather_facts: no
  connection: local

  tasks:
    - name: Load router configuration
      include_vars:
        file: "../routers/{{ inventory_hostname }}.yaml"
        name: router_config

    - name: Validate BGP ASN exists
      assert:
        that:
          - router_config.bgp.asn is defined
        success_msg: "✓ {{ inventory_hostname }}: BGP ASN {{ router_config.bgp.asn }} is valid"
        fail_msg: "✗ {{ inventory_hostname }}: BGP ASN is missing"